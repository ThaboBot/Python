<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Store{% endblock %}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        body { margin:0; font-family:'Inter',sans-serif; background:#f4f6fb; color:#1d2731; }
        .container { width:min(1100px,100%); margin:0 auto; padding:24px; }
        .header { display:flex; align-items:center; justify-content:space-between; gap:20px; padding:18px 0; }
        .brand { font-size:1.45rem; font-weight:700; color:#1b2a49; text-decoration:none; }
        .nav-links a { margin-left:20px; color:#56637a; text-decoration:none; font-weight:500; }
        .hero, .section { background:#fff; border-radius:24px; padding:28px; box-shadow:0 16px 40px rgba(31,55,86,.08); margin-bottom:24px; }
        .card { background:#fff; border-radius:20px; border:1px solid #e8ecf6; overflow:hidden; box-shadow:0 12px 30px rgba(29,39,49,.06); }
        .product-grid { display:grid; gap:20px; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); }
        .button, .btn { display:inline-flex; align-items:center; justify-content:center; padding:12px 18px; border-radius:14px; text-decoration:none; border:none; cursor:pointer; transition:.2s ease; }
        .button { background:#334d9a; color:#fff; }
        .button:hover, .btn:hover { transform:translateY(-1px); background:#263f7c; }
        .secondary { background:#eef1f8; color:#374557; }
        .section-title { font-size:1.2rem; margin-bottom:18px; font-weight:700; }
        .text-muted { color:#677089; }
        .product-card { display:flex; flex-direction:column; gap:18px; }
        .product-card h3 { margin:0; font-size:1.1rem; }
        .product-card p { margin:0; line-height:1.6; }
        .product-price { font-size:1.25rem; font-weight:700; color:#1b2a49; }
        .tag { display:inline-flex; padding:6px 12px; border-radius:999px; background:#eef1f8; color:#334d9a; font-size:.85rem; }
        form label { font-weight:600; display:block; margin-bottom:8px; color:#293247; }
        form input, form textarea, form select { width:100%; padding:14px 16px; border:1px solid #d8dee7; border-radius:16px; background:#fafbff; font-size:1rem; color:#131f34; margin-bottom:16px; }
        .footer { text-align:center; color:#7a8598; font-size:.95rem; padding:32px 0; }
        .breadcrumbs { color:#667085; font-size:.95rem; margin-bottom:20px; }
        .breadcrumbs a { color:#334d9a; text-decoration:none; }
        .hero-grid { display:grid; gap:18px; grid-template-columns:1fr auto; align-items:center; }
        .hero-copy h1 { margin:0 0 16px; font-size:2.2rem; line-height:1.1; }
        .hero-copy p { margin:0; color:#55607a; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a class="brand" href="{% url 'store:home' %}">Storefront</a>
            <nav class="nav-links">
                <a href="{% url 'store:home' %}">Home</a>
                <a href="/admin/">Admin</a>
                <a href="/api/">API</a>
            </nav>
        </header>

        {% block content %}{% endblock %}
    </div>
    <footer class="footer">Built with Django and Django REST Framework.</footer>
</body>
</html>
